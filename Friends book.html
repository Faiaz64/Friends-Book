<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends Book</title>
    <style>
        :root {
            --bg-main: #ffffff; 
            --accent-orange: #ff6b00; 
            --accent-soft: #fff7ed; 
            --text-dark: #000000; 
        }

        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        body { background-color: var(--bg-main); display: flex; flex-direction: column; align-items: center; color: var(--text-dark); }

        .logo-font { letter-spacing: -2px; font-weight: 900; -webkit-text-stroke: 1.5px black; }

        /* --- SPLASH SCREEN --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-main); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10000;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .loading-logo h1 { font-size: 3.5rem; color: var(--accent-orange); margin: 0; animation: bounce 2s infinite; }
        .loading-logo span { color: white; -webkit-text-stroke: 1.5px black; }
        .signature { position: absolute; bottom: 40px; font-size: 0.8rem; letter-spacing: 3px; color: #71717a; }
        .signature b { font-weight: 900; font-size: 1rem; color: var(--text-dark); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* --- AUTH SCREEN --- */
        #auth-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--accent-soft); z-index: 9000; flex-direction: column; align-items: center; justify-content: center;
        }
        .auth-card { background: white; width: 85%; max-width: 350px; padding: 30px; border-radius: 40px; border: 3px solid black; box-shadow: 10px 10px 0px black; text-align: center; }
        .profile-preview-circle { width: 100px; height: 100px; background: #f4f4f5; border-radius: 50%; margin: 0 auto 20px; overflow: hidden; border: 3px solid black; display: flex; align-items: center; justify-content: center; }
        .profile-preview-circle img { width: 100%; height: 100%; object-fit: cover; }
        
        input[type="text"] { 
            width: 100%; padding: 15px; border: 3px solid black; border-radius: 15px; outline: none; 
            margin-bottom: 20px; box-sizing: border-box; text-align: center; font-weight: 800;
        }

        .btn-main { background: var(--accent-orange); color: white; border: 3px solid black; padding: 15px; border-radius: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; width: 100%; box-shadow: 5px 5px 0px black; transition: 0.1s; -webkit-text-stroke: 1px black; }
        .btn-main:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px black; }

        /* --- HEADER --- */
        header { 
            width: 100%; padding: 15px 0; background: rgba(255,255,255,0.9); 
            position: sticky; top: 0; z-index: 100; display: flex; justify-content: center; align-items: center;
        }
        header h2 { margin: 0; font-size: 2rem; color: var(--accent-orange); }
        header h2 span { color: white; -webkit-text-stroke: 1.2px black; }

        .header-profile-wrap { position: absolute; right: 20px; }
        .header-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 3px solid black; cursor: pointer; }

        #profile-dropdown {
            position: absolute; top: 55px; right: 0; background: white; 
            padding: 15px; border-radius: 20px; border: 3px solid black; box-shadow: 5px 5px 0px black;
            display: none; flex-direction: column; align-items: center; min-width: 140px;
        }
        #profile-dropdown b { margin-bottom: 10px; font-weight: 900; }
        .logout-btn { background: #fee2e2; color: #ef4444; border: 2px solid black; padding: 6px 12px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; }

        /* --- FEED --- */
        .feed-container { max-width: 500px; width: 95%; padding: 10px 0 100px 0; }
        .post-card { background: white; border-radius: 25px; margin-bottom: 25px; padding: 18px; border: 3px solid black; box-shadow: 8px 8px 0px #000; position: relative; }
        .post-header { display: flex; align-items: center; margin-bottom: 12px; font-weight: 900; color: #000; font-size: 1.1rem; }
        .post-avatar { width: 38px; height: 38px; border-radius: 50%; margin-right: 12px; border: 2px solid black; object-fit: cover; }
        
        /* IMAGE ZOOM STYLES */
        .post-image-container { width: 100%; border-radius: 15px; margin-bottom: 12px; border: 2px solid black; overflow: hidden; cursor: zoom-in; }
        .post-image { width: 100%; display: block; transition: transform 0.3s ease; }
        .post-image-container:hover .post-image { transform: scale(1.05); }

        /* FULLSCREEN ZOOM OVERLAY */
        #zoom-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 11000; display: none;
            justify-content: center; align-items: center; cursor: zoom-out;
        }
        #zoom-overlay img { max-width: 95%; max-height: 95%; border: 4px solid white; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

        .trash-btn {
            position: absolute; top: 15px; right: 15px; width: 32px; height: 32px;
            background: #ffffff; border: 2px solid black; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 3px 3px 0px black; transition: 0.1s; z-index: 10;
        }
        .trash-btn svg { width: 18px; height: 18px; fill: #ef4444; pointer-events: none; }
        .trash-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px black; }

        /* --- FAB & MODALS --- */
        .fab { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: var(--accent-orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 3px solid black; box-shadow: 5px 5px 0px black; z-index: 1000; }
        .fab span { color: white; font-size: 50px; font-weight: 900; -webkit-text-stroke: 1.5px black; pointer-events: none; line-height: 0; margin-top: -4px; }

        #post-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 30px; border-radius: 30px; border: 4px solid black; box-shadow: 10px 10px 0px black; }
        .preview-box { width: 100%; height: 200px; background: #fafafa; border-radius: 20px; border: 3px dashed black; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; overflow: hidden; position: relative; cursor: pointer; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }
        .preview-label { background: var(--accent-orange); color: white; padding: 10px 20px; border-radius: 12px; border: 2.5px solid black; font-weight: 900; text-transform: uppercase; font-size: 0.8rem; pointer-events: none; box-shadow: 4px 4px 0px black; -webkit-text-stroke: 0.5px black; }
        textarea { width: 100%; border: 3px solid black; border-radius: 15px; padding: 12px; margin-bottom: 15px; outline: none; font-weight: 700; font-family: inherit; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loading-logo"><h1 class="logo-font">Friends<span>Book</span></h1></div>
        <div class="signature">FROM <b>ADIB AL FAIAZ</b></div>
    </div>

    <div id="zoom-overlay" onclick="closeZoom()">
        <img id="zoomed-image" src="">
    </div>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="font-weight: 900; margin-top: 0; -webkit-text-stroke: 1px black;">Hello, Friend!</h2>
            <div class="profile-preview-circle" id="signup-preview">👤</div>
            <label class="btn-main" for="signup-photo" style="display:inline-block; margin-bottom:15px; width:auto; padding: 10px 20px;">Pick Photo</label>
            <input type="file" id="signup-photo" accept="image/*" style="display:none">
            <input type="text" id="signup-name" placeholder="Full Name">
            <button class="btn-main" onclick="finishSignUp()">Enter Feed 🚀</button>
        </div>
    </div>

    <div id="app-content" style="display:none; width: 100%; flex-direction: column; align-items: center;">
        <header>
            <h2 class="logo-font">Friends<span>Book</span></h2>
            <div class="header-profile-wrap">
                <img id="header-user-pic" src="" class="header-avatar" onclick="toggleDropdown()">
                <div id="profile-dropdown">
                    <b id="header-user-name">User</b>
                    <button class="logout-btn" onclick="signOut()">Sign Out</button>
                </div>
            </div>
        </header>
        <div class="feed-container" id="feed"></div>
        <div class="fab" onclick="toggleModal(true)"><span>+</span></div>
    </div>

    <div id="post-modal">
        <div class="modal-content">
            <h3 style="margin-top:0; font-weight: 900; -webkit-text-stroke: 1px black;">New Post</h3>
            <label for="post-photo" class="preview-box" id="post-img-prev">
                <div class="preview-label">Add Image</div>
            </label>
            <input type="file" id="post-photo" accept="image/*" style="display:none">
            <textarea id="captionInput" rows="3" placeholder="What's on your mind?"></textarea>
            <button class="btn-main" onclick="addPost()">Post Now</button>
            <p onclick="toggleModal(false)" style="cursor:pointer; margin-top:15px; font-weight:900; text-align:center;">Cancel</p>
        </div>
    </div>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('fb_user')) || null;
        let tempProfilePic = "";
        let tempPostPic = "";

        window.addEventListener('load', () => {
            purgeOldPosts();
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.visibility = 'hidden';
                    checkUserStatus();
                }, 800);
            }, 5000); 
        });

        function purgeOldPosts() {
            let posts = JSON.parse(localStorage.getItem('fb_posts')) || [];
            const durationInMs = 3 * 24 * 60 * 60 * 1000; 
            const now = Date.now();
            const activePosts = posts.filter(post => (now - post.id) < durationInMs);
            localStorage.setItem('fb_posts', JSON.stringify(activePosts));
        }

        function checkUserStatus() {
            if (!currentUser) {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-content').style.display = 'none';
            } else {
                document.getElementById('auth-screen').style.display = 'none';
                showMainApp();
            }
        }

        // --- IMAGE ZOOM FUNCTIONS ---
        function openZoom(src) {
            const overlay = document.getElementById('zoom-overlay');
            const img = document.getElementById('zoomed-image');
            img.src = src;
            overlay.style.display = 'flex';
        }

        function closeZoom() {
            document.getElementById('zoom-overlay').style.display = 'none';
        }

        document.getElementById('signup-photo').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                tempProfilePic = event.target.result;
                document.getElementById('signup-preview').innerHTML = `<img src="${tempProfilePic}">`;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        function finishSignUp() {
            const nameInput = document.getElementById('signup-name').value.trim();
            if (!nameInput) return alert("Please enter your name!");
            const existingPosts = JSON.parse(localStorage.getItem('fb_posts')) || [];
            const isTaken = existingPosts.some(post => post.userName.toLowerCase() === nameInput.toLowerCase());
            if (isTaken) return alert("Sorry, this name is already taken!");

            currentUser = { name: nameInput, photo: tempProfilePic || "" };
            localStorage.setItem('fb_user', JSON.stringify(currentUser));
            checkUserStatus();
        }

        function showMainApp() {
            document.getElementById('app-content').style.display = 'flex';
            document.getElementById('header-user-name').innerText = currentUser.name;
            document.getElementById('header-user-pic').src = currentUser.photo || "https://via.placeholder.com/100";
            render();
        }

        function toggleDropdown() {
            const dd = document.getElementById('profile-dropdown');
            dd.style.display = dd.style.display === 'flex' ? 'none' : 'flex';
        }

        window.onclick = (e) => { if (!e.target.matches('.header-avatar')) { const dd = document.getElementById('profile-dropdown'); if(dd) dd.style.display = 'none'; } };

        function signOut() { if(confirm("Sign out?")) { localStorage.removeItem('fb_user'); location.reload(); } }

        function toggleModal(show) { document.getElementById('post-modal').style.display = show ? 'flex' : 'none'; }

        document.getElementById('post-photo').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                tempPostPic = event.target.result;
                document.getElementById('post-img-prev').innerHTML = `<img src="${tempPostPic}">`;
                document.getElementById('post-img-prev').style.borderStyle = "solid";
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        function addPost() {
            const text = document.getElementById('captionInput').value;
            if (!tempPostPic && !text) return;
            const post = {
                id: Date.now(),
                userName: currentUser.name,
                userPhoto: currentUser.photo,
                img: tempPostPic,
                msg: text,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };
            let posts = JSON.parse(localStorage.getItem('fb_posts')) || [];
            posts.unshift(post);
            localStorage.setItem('fb_posts', JSON.stringify(posts));
            
            document.getElementById('captionInput').value = "";
            document.getElementById('post-img-prev').innerHTML = `<div class="preview-label">Add Image</div>`;
            document.getElementById('post-img-prev').style.borderStyle = "dashed";
            tempPostPic = "";
            toggleModal(false);
            render();
        }

        function deletePost(postId) {
            if(confirm("Delete this post?")) {
                let posts = JSON.parse(localStorage.getItem('fb_posts')) || [];
                let updatedPosts = posts.filter(p => p.id !== postId);
                localStorage.setItem('fb_posts', JSON.stringify(updatedPosts));
                render();
            }
        }

        function render() {
            const posts = JSON.parse(localStorage.getItem('fb_posts')) || [];
            const feed = document.getElementById('feed');
            if (posts.length === 0) {
                feed.innerHTML = `<div style="text-align:center; padding:50px; color:var(--accent-orange); font-weight:900; border:3px dashed black; border-radius:30px;">Your feed is quiet... 🚀</div>`;
                return;
            }
            
            feed.innerHTML = posts.map(p => {
                const showTrash = (p.userName === currentUser.name) ? 
                    `<div class="trash-btn" onclick="event.stopPropagation(); deletePost(${p.id})">
                        <svg viewBox="0 0 24 24"><path d="M3 6v18h18v-18h-18zm5 14c0 .552-.448 1-1 1s-1-.448-1-1v-10c0-.552.448-1 1-1s1 .448 1 1v10zm5 0c0 .552-.448 1-1 1s-1-.448-1-1v-10c0-.552.448-1 1-1s1 .448 1 1v10zm5 0c0 .552-.448 1-1 1s-1-.448-1-1v-10c0-.552.448-1 1-1s1 .448 1 1v10zm4-18v2h-20v-2h5.711c.9 0 1.631-1.099 1.631-2h5.315c0 .901.73 2 1.631 2h5.712z"/></svg>
                    </div>` : '';

                return `
                <div class="post-card">
                    ${showTrash}
                    <div class="post-header">
                        <img src="${p.userPhoto || 'https://via.placeholder.com/50'}" class="post-avatar">
                        ${p.userName}
                    </div>
                    ${p.img ? `
                        <div class="post-image-container" onclick="openZoom('${p.img}')">
                            <img src="${p.img}" class="post-image">
                        </div>` : ''}
                    <div style="font-size:1.1rem; font-weight:900; color:#000;">${p.msg}</div>
                    <div style="font-size:0.75rem; color:#52525b; text-align:right; margin-top:15px; font-weight:900;">${p.time}</div>
                </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
